services:
  db:
    image: postgres:18.2-alpine
    environment:
      POSTGRES_DB: trace4eo
      POSTGRES_USER: trace4eo
      POSTGRES_PASSWORD: trace4eo
      KC_DB_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./config/postgres/init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace4eo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: tracing-system:0.1.0-SNAPSHOT
    pull_policy: never
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: trace4eo
      DB_USER: trace4eo
      DB_PASSWORD: trace4eo
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/trace4eo
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/trace4eo/protocol/openid-connect/certs
      KEYCLOAK_BASE_URL: http://keycloak:8180
      KEYCLOAK_REALM: trace4eo
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    build: ./tracing-ui
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8180
      KC_FEATURES: token-exchange,admin-fine-grained-authz:v1
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./config/keycloak/trace4eo-realm.json:/opt/keycloak/data/import/trace4eo-realm.json:ro
    ports:
      - "8180:8180"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  postgres_data:
