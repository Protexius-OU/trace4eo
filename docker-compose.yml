services:
  db:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_DB: trace4eo
      POSTGRES_USER: trace4eo
      POSTGRES_PASSWORD: trace4eo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace4eo"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./tracing-ui
    ports:
      - "3000:80"

volumes:
  postgres_data:
