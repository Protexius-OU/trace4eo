jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind", version = "2.19.0" }
rewrite-static-analysis = { module = "org.openrewrite.recipe:rewrite-static-analysis", version = "2.9.0" }

[bundles]


[plugins]
errorprone = { id = "net.ltgt.errorprone", version = "4.2.0" }
