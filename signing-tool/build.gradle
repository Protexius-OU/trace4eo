import org.springframework.boot.gradle.plugin.SpringBootPlugin

plugins {
    id("java")
    alias(libs.plugins.spring.boot)
    alias(libs.plugins.graalvm.native)

    // code quality
    id("checkstyle")
    alias(libs.plugins.errorprone)
    alias(libs.plugins.owasp)
    alias(libs.plugins.spotbugs)
    alias(libs.plugins.openrewrite)
}

apply from: rootProject.file("gradle/build-conventions.gradle")

group = 'com.protexius.trace4eo'
version = '0.1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation(project(':provenance'))
    implementation(platform(SpringBootPlugin.BOM_COORDINATES))
    implementation(libs.bundles.spring.shell)

    errorprone(libs.error.prone.core)
    rewrite(libs.rewrite.static.analysis)

    testImplementation(libs.spring.shell.test)
    testImplementation(libs.spring.shell.test.autoconfigure)
    testImplementation("org.springframework.boot:spring-boot-starter-test")
    testImplementation("org.mockito:mockito-core:5.21.0")
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

testing {
    suites {
        test {
            useJUnitJupiter("6.0.2")
        }
    }
}

dependencyCheck {
    outputDirectory = layout.buildDirectory.dir("reports/dependency-check").get()
    formats = ["XML", "HTML"]
    scanConfigurations = ["compileClasspath", "runtimeClasspath"]
    nvd {
        apiKey = providers.gradleProperty("dependencyCheck.nvd.apiKey").getOrNull()
    }
}

checkstyle {
    toolVersion = libs.versions.checkstyle.get()
}

tasks.named('checkstyleAot').configure { enabled = false }
tasks.named('checkstyleAotTest').configure { enabled = false }

graalvmNative {
    binaries {
        main {
            imageName = "signing-tool"
            mainClass = "com.protexius.trace4eo.signing.SigningToolApplication"
            // gRPC/Netty (via sigstore-java) creates Logger instances in static initializers,
            // placing logback objects in the image heap. GraalVM 25 defaults to runtime init,
            // so these packages must be explicitly marked for build-time initialization.
            buildArgs.add("--initialize-at-build-time=ch.qos.logback")
            buildArgs.add("--initialize-at-build-time=org.slf4j")
            // grpc-netty-shaded bundles tcnative (OpenSSL JNI bindings). Its static initializer
            // calls JNI native methods which fail during GraalVM's build-time analysis. Defer
            // the entire tcnative package to runtime, and disable OpenSSL so Netty falls back
            // to the JDK SSL provider.
            buildArgs.add("--initialize-at-run-time=io.grpc.netty.shaded.io.netty.internal.tcnative")
            buildArgs.add("--initialize-at-run-time=io.grpc.netty.shaded.io.netty.handler.ssl")
            buildArgs.add("-Dio.grpc.netty.shaded.io.netty.handler.ssl.noOpenSsl=true")
            // JLine (via Spring Shell) calls System.load to load its native terminal library.
            // On JDK 24+ this triggers a restricted-method warning at startup unless native
            // access is explicitly granted to the unnamed module (classpath).
            buildArgs.add("--enable-native-access=ALL-UNNAMED")
            // NOTE: com.google.protobuf and com.google.gson are intentionally NOT initialized at
            // build time. Build-time initialization freezes protobuf's MessageSchema with JVM
            // object-layout Unsafe offsets that differ from GraalVM native-image layout, causing
            // JsonFormat.Parser.merge() to silently return default (empty) values for all fields.
            // The RuntimeHints registrations in SigningToolApplication.Hints cover the specific
            // reflection calls (DescriptorProtos$FeatureSet methods, ProtocolMessageEnum valueOf,
            // dev.sigstore Gson fields) that protobuf needs at runtime.
        }
    }
}

rewrite {
    activeRecipe("org.openrewrite.java.RemoveUnusedImports")
    activeRecipe("org.openrewrite.staticanalysis.CodeCleanup")
    setExportDatatables(true)
}
