spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trace4eo}
    username: ${DB_USER:trace4eo}
    password: ${DB_PASSWORD:trace4eo}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/trace4eo}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-part-count: 150

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:trace4eo}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

signer:
  allowed-domains: ${SIGNER_ALLOWED_DOMAINS:}

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: WARN
