<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provenance Graph Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="/css/graph-viewer.css">
</head>
<body>
    <div id="header">
        <h1>Provenance Graph</h1>
        <div id="controls">
            <label for="depth">Max Depth:</label>
            <input type="number" id="depth" min="1" value="10">
            <button id="reload">Reload</button>
        </div>
        <div id="info"></div>
    </div>
    <div id="graph-container">
        <svg id="graph"></svg>
    </div>
    <div id="tooltip"></div>
    <div id="legend"></div>
    <script src="/js/graph-viewer.js"></script>
</body>
</html>
