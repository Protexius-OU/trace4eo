name: Build and Publish Docker Images

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    name: Build and Publish Backend
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trace4eo-backend
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          set -euo pipefail
          IMAGE_LC="${IMAGE,,}"
          ./gradlew :tracing-system:bootBuildImage --imageName="$IMAGE_LC:latest"
          docker tag "$IMAGE_LC:latest" "$IMAGE_LC:${{ github.sha }}"
          docker push "$IMAGE_LC:latest"
          docker push "$IMAGE_LC:${{ github.sha }}"

  build-frontend:
    name: Build and Publish Frontend
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tracing-ui/package-lock.json

      - name: Install dependencies
        working-directory: tracing-ui
        run: npm ci

      - name: Build frontend
        working-directory: tracing-ui
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trace4eo-frontend
        run: |
          set -euo pipefail
          IMAGE_LC="${IMAGE,,}"
          docker build -t "$IMAGE_LC:latest" -t "$IMAGE_LC:${{ github.sha }}" ./tracing-ui
          docker push "$IMAGE_LC:latest"
          docker push "$IMAGE_LC:${{ github.sha }}"
