name: Build and Publish Docker Images

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    name: Build and Publish Backend
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trace4eo-backend
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          set -euo pipefail
          IMAGE_LC="${IMAGE,,}"
          ./gradlew :tracing-system:bootBuildImage --imageName="$IMAGE_LC:latest"
          docker tag "$IMAGE_LC:latest" "$IMAGE_LC:${{ github.sha }}"
          docker push "$IMAGE_LC:latest"
          docker push "$IMAGE_LC:${{ github.sha }}"

  build-frontend:
    name: Build and Publish Frontend
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tracing-ui/package-lock.json

      - name: Install dependencies
        working-directory: tracing-ui
        run: npm ci

      - name: Build frontend
        working-directory: tracing-ui
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/trace4eo-frontend" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./tracing-ui
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
