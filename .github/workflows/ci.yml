name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build and test
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: ./gradlew build

  check-frontend:
    name: Type-check and Lint Frontend
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tracing-ui/package-lock.json

      - name: Install dependencies
        working-directory: tracing-ui
        run: npm ci

      - name: Lint
        working-directory: tracing-ui
        run: npm run lint
