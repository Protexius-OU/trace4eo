name: Build Native CLI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux-amd64
          - macos-arm64
  workflow_call:
    inputs:
      platform:
        description: 'Target platform'
        required: false
        default: 'all'
        type: string

jobs:
  build-linux:
    name: Build linux-amd64
    runs-on: ubuntu-latest
    if: inputs.platform == 'all' || inputs.platform == 'linux-amd64'
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: gradle/actions/setup-gradle@v6
      - name: Build native binaries
        run: ./gradlew :signing-tool:nativeCompile :verification-tool:nativeCompile
      - name: Rename with platform suffix
        run: |
          mkdir -p dist
          cp signing-tool/build/native/nativeCompile/signing-tool dist/signing-tool-linux-amd64
          cp verification-tool/build/native/nativeCompile/verification-tool dist/verification-tool-linux-amd64
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-amd64
          path: dist/

  build-macos:
    name: Build macos-arm64
    runs-on: macos-latest
    if: inputs.platform == 'all' || inputs.platform == 'macos-arm64'
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: gradle/actions/setup-gradle@v6
      - name: Build native binaries
        run: ./gradlew :signing-tool:nativeCompile :verification-tool:nativeCompile
      - name: Rename with platform suffix
        run: |
          mkdir -p dist
          cp signing-tool/build/native/nativeCompile/signing-tool dist/signing-tool-macos-arm64
          cp verification-tool/build/native/nativeCompile/verification-tool dist/verification-tool-macos-arm64
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-macos-arm64
          path: dist/
