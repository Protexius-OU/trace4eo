name: Build Native CLI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux-amd64
          - macos-arm64
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      inputs.platform == 'all' ||
      inputs.platform == matrix.platform
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            suffix: linux-amd64
          - os: macos-latest
            platform: macos-arm64
            suffix: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native binaries
        run: |
          ./gradlew :signing-tool:nativeCompile :verification-tool:nativeCompile

      - name: Collect artifacts
        run: |
          cp signing-tool/build/native/nativeCompile/signing-tool signing-tool-${{ matrix.suffix }}
          cp verification-tool/build/native/nativeCompile/verification-tool verification-tool-${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: |
            signing-tool-${{ matrix.suffix }}
            verification-tool-${{ matrix.suffix }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            signing-tool-${{ matrix.suffix }}
            verification-tool-${{ matrix.suffix }}
