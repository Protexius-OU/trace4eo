services:
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - keycloak

  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trace4eo
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    restart: unless-stopped
    command: start --import-realm --http-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: ${VM_HOST}
      KC_HTTP_PORT: 8180
      KC_PROXY_HEADERS: xforwarded
      KC_FEATURES: token-exchange,admin-fine-grained-authz:v1
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./config/keycloak/trace4eo-realm.deploy.json:/opt/keycloak/data/import/trace4eo-realm.json:ro
    ports:
      - "127.0.0.1:8180:8180"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  backend:
    image: ghcr.io/protexius-ou/trace4eo-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: trace4eo
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: https://${VM_HOST}/realms/trace4eo
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/trace4eo/protocol/openid-connect/certs
      KEYCLOAK_BASE_URL: http://keycloak:8180
      KEYCLOAK_REALM: trace4eo
      CORS_ALLOWED_ORIGINS: https://${VM_HOST}
      SIGNER_ALLOWED_DOMAINS: ${SIGNER_ALLOWED_DOMAINS:-}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    image: ghcr.io/protexius-ou/trace4eo-frontend:latest
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: https://${VM_HOST}/realms/trace4eo
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
